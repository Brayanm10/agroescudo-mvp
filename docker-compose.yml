services:
  db:
    image: postgres:16-alpine
    container_name: agroescudo-db
    environment:
      POSTGRES_DB: agroescudo
      POSTGRES_USER: agroescudo
      POSTGRES_PASSWORD: agroescudo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agroescudo -d agroescudo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: agroescudo-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://agroescudo:agroescudo@db:5432/agroescudo
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/db')"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
